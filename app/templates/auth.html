<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Organizador Financeiro</title>
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
    <div class="auth-container">
        {% if error %}
            <div class="alert-error" style="background-color: #ffcccc; color: #cc0000; padding: 10px; border-radius: 5px; margin-bottom: 15px; border: 1px solid #cc0000;">
                <i class="fas fa-exclamation-circle"></i> {{ error }}
            </div>
        {% endif %}
        {% block auth_content %}
        {% endblock auth_content %}
    </div>
</body>
</html>
